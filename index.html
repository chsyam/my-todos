<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
    <link rel="icon" href="todo.png">
    <style>
        .todo {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            font-size: 22px;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

        table {
            border-collapse: collapse;
        }

        table th {
            font-size: 26px;
        }

        table th,
        td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="todo">
        <div class="list">
            <table>
                <thead>
                    <tr>
                        <th colspan="2">Todo List</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>re-modelling personal website</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>club management project</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
